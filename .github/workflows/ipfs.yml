
name: Deploy site to IPFS (Pinata)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site folder
        run: |
          set -euo pipefail
          rm -rf ipfs
          mkdir -p ipfs

          # Core
          cp index.html style.css app.js ipfs/

          # Assets
          if [ -d assets ]; then cp -R assets ipfs/; fi

          # Extras (si existen)
          cp *.jpg ipfs/ 2>/dev/null || true
          cp *.jpeg ipfs/ 2>/dev/null || true
          cp *.png ipfs/ 2>/dev/null || true
          cp *.pdf ipfs/ 2>/dev/null || true

          echo "Prepared files:"
          find ipfs -type f | sed 's|^| - |'

      - name: Upload folder to Pinata (with filepath)
        env:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_API_KEY: ${{ secrets.PINATA_SECRET_API_KEY }}
        run: |
          set -euo pipefail

          cmd=(curl -sS -X POST "https://api.pinata.cloud/pinning/pinFileToIPFS"
            -H "pinata_api_key: ${PINATA_API_KEY}"
            -H "pinata_secret_api_key: ${PINATA_SECRET_API_KEY}"
          )

          # ✅ CLAVE: agregar `filepath` por cada archivo (esto habilita folder upload) 
          while IFS= read -r -d '' f; do
            rel="${f#ipfs/}"
            cmd+=( -F "file=@${f};filename=${rel};filepath=${rel}" )
          done < <(find ipfs -type f -print0)

          # Metadata + Options (CIDv1 bafy...)
          cmd+=( -F 'pinataMetadata={"name":"alemty.eth-site"}' )
          cmd+=( -F 'pinataOptions={"cidVersion":1}' )

          echo "Uploading to Pinata..."
          resp="$("${cmd[@]}")"
          echo "Pinata response: $resp"

          cid="$(echo "$resp" | sed -n 's/.*"IpfsHash"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')"
          if [ -z "$cid" ]; then
            echo "❌ No se encontró IpfsHash. Respuesta completa arriba."
            exit 1
          fi

          echo "✅ CID: $cid"
          echo "$cid" > ipfs-cid.txt

      - name: Upload CID artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipfs-cid
          path: ipfs-cid.txt
