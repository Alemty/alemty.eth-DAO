
name: Deploy site to IPFS (Pinata)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) Prepara SOLO el sitio (evita .git/.github)
      - name: Prepare site folder
        run: |
          set -euo pipefail
          rm -rf ipfs
          mkdir -p ipfs

          # Core
          cp index.html style.css app.js ipfs/

          # Assets
          if [ -d assets ]; then cp -R assets ipfs/; fi

          # Extras opcionales (si existen)
          cp *.jpg ipfs/ 2>/dev/null || true
          cp *.jpeg ipfs/ 2>/dev/null || true
          cp *.png ipfs/ 2>/dev/null || true
          cp *.pdf ipfs/ 2>/dev/null || true

          echo "Prepared files:"
          find ipfs -type f | sed 's|^| - |'

      # 2) Folder upload correcto (con filepath) + nombre versionado automático
      - name: Upload folder to Pinata (versioned)
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
        run: |
          set -euo pipefail

          # Dependencias para armar FormData con filepath (patrón de folders de Pinata) 
          npm init -y >/dev/null 2>&1
          npm i form-data recursive-fs base-path-converter got@14 >/dev/null 2>&1

          node <<'NODE'
          import fs from "fs";
          import FormData from "form-data";
          import rfs from "recursive-fs";
          import basePathConverter from "base-path-converter";
          import got from "got";

          const url = "https://api.pinata.cloud/pinning/pinFileToIPFS";
          const src = "ipfs";
          const jwt = process.env.PINATA_JWT;

          if (!jwt) {
            console.error("❌ Falta PINATA_JWT en GitHub Secrets.");
            process.exit(1);
          }

          // ---- 1) Detecta version automáticamente desde index.html ----
          // Busca: v0.06 (o cualquier vX.Y/Z) dentro del HTML
          let version = "v0.00";
          try {
            const html = fs.readFileSync("index.html", "utf8");
            const m = html.match(/\bv\d+(?:\.\d+)+\b/); // v0.06, v1.2.3, etc.
            if (m?.[0]) version = m[0];
          } catch {}

          // ---- 2) Datos de GitHub para versionado legible ----
          const sha = (process.env.GITHUB_SHA || "nosha").slice(0, 8);
          const run = process.env.GITHUB_RUN_NUMBER || "0";
          const repo = process.env.GITHUB_REPOSITORY || "repo";
          const date = new Date().toISOString().slice(0, 10); // YYYY-MM-DD

          // Nombre final visible en Pinata (único y claro)
          const name = `alemty.eth-${version}-${date}-${sha}-run${run}`;

          // ---- 3) Lee archivos recursivo (folder upload) ----
          const { files } = await rfs.read(src);
          if (!files?.length) {
            console.error("❌ La carpeta ipfs está vacía, no hay nada que subir.");
            process.exit(1);
          }

          const data = new FormData();

          // ✅ CLAVE: filepath por archivo para reconstruir carpeta en Pinata 
          for (const file of files) {
            data.append("file", fs.createReadStream(file), {
              filepath: basePathConverter(src, file),
            });
          }

          // Metadata + keyvalues (buscable en Pinata)
          data.append("pinataMetadata", JSON.stringify({
            name,
            keyvalues: { repo, version, sha, run, date }
          }));

          // CIDv1 (bafy...) recomendado en Pinata options 
          data.append("pinataOptions", JSON.stringify({ cidVersion: 1 }));

          // Auth Bearer token como en la doc de Pinata 
          const resp = await got(url, {
            method: "POST",
            headers: { Authorization: `Bearer ${jwt}` },
            body: data,
          }).json();

          console.log("✅ Pinata response:", resp);

          if (!resp.IpfsHash) {
            console.error("❌ No llegó IpfsHash en la respuesta.");
            process.exit(1);
          }

          // Guarda outputs
          fs.writeFileSync("ipfs-cid.txt", resp.IpfsHash, "utf8");
          fs.writeFileSync("ipfs-name.txt", name, "utf8");

          console.log("✅ Name:", name);
          console.log("✅ CID :", resp.IpfsHash);
          NODE

      # 4) Guarda CID + Nombre como artifacts
      - name: Upload CID + Name artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipfs-deploy
          path: |
            ipfs-cid.txt
            ipfs-name.txt


